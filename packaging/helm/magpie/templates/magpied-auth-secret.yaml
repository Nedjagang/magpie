{{- /*
Generates a Secret holding MAGPIE_API_TOKEN when the operator supplied
a literal token via --set magpied.auth.token=... and DID NOT point at
an existingSecret. The deployment template references this Secret by
name (or the existing one) via secretKeyRef.

Skipped entirely when both fields are empty (v0.1-compatible no-auth
mode) and when an existingSecret is named (operator manages the Secret
out of band).
*/ -}}
{{- if and .Values.magpied.auth.token (not .Values.magpied.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "magpie.fullname" . }}-auth
  labels:
    {{- include "magpie.labels" . | nindent 4 }}
type: Opaque
stringData:
  MAGPIE_API_TOKEN: {{ .Values.magpied.auth.token | quote }}
{{- end }}
