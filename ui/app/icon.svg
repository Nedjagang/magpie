<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rounded-square tile, same ink tone as the wordmark -->
  <rect width="64" height="64" rx="14" fill="#0b0b0c"/>
  <!-- Lowercase serif 'm' matching the masthead typeface stack.
       font-weight 400 (light serif) reads well down to 20px; below that the
       OS rasterizer will pick the nearest hinted weight. -->
  <text
    x="32"
    y="44"
    font-family="Newsreader, 'Iowan Old Style', 'Palatino Linotype', Georgia, serif"
    font-size="46"
    font-weight="400"
    fill="#f6f4ec"
    text-anchor="middle"
    letter-spacing="-0.02em"
  >m</text>
  <!-- Accent dot — the 'shiny'. Sits top-right like a notification marker. -->
  <circle cx="49" cy="17" r="4" fill="#2f6b4d"/>
</svg>
